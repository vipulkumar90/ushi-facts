name: Post Daily Fact

on:
  schedule:
    # 09:00 JST, 12:00 JST, 20:00 JST
    - cron: "0 0,3,11 * * *"

  workflow_dispatch:

jobs:
  post-fact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          cat <<EOF > .env
          DATABASE_PROVIDER=${{ secrets.DATABASE_PROVIDER }}

          POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
          POSTGRES_DATABASE=${{ secrets.POSTGRES_DATABASE }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE=${{ secrets.POSTGRES_SSLMODE }}

          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}

          SYNC_SEED_DATA=${{ secrets.SYNC_SEED_DATA }}

          FACT_SELECTION_STRATEGY=${{ secrets.FACT_SELECTION_STRATEGY }}
          ALLOW_REPEAT=${{ secrets.ALLOW_REPEAT }}
          DEFAULT_CATEGORY=${{ secrets.DEFAULT_CATEGORY }}

          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          EOF

      - name: Run Application
        run: python app.py
